<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
</head>
<body>

    <h1>GPA Calculator</h1>
    
    <p>Select your letter grade and click "Add Grade".</p>
    
    <select id="grade-dropdown">
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
        <option value="F">F</option>
    </select>
    
    <button id="add-btn">Add Grade</button>

    <br><br>

    <h3>Grades Entered:</h3>
    <ul id="grades-display">
        </ul>

    <button id="calc-btn">Calculate Final GPA</button>
    
    <h2>Your GPA is: <span id="gpa-result">0.0</span></h2>

    <script src="script.js"></script>

</body>
</html>
